<!DOCTYPE html>
<html>

<head>
<title>AI HR Interview</title>

<style>

*{
box-sizing:border-box;
}

body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#667eea,#764ba2);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:45px;
border-radius:16px;
width:500px;
box-shadow:0 25px 60px rgba(0,0,0,0.25);
text-align:center;
transition:all .3s ease;
}

h1{
margin-bottom:5px;
font-size:28px;
}

.subtitle{
color:#777;
font-size:14px;
margin-bottom:20px;
}

.progress-text{
font-size:14px;
color:#666;
margin-bottom:10px;
}

.progress-bar{
width:100%;
height:8px;
background:#e5e7eb;
border-radius:10px;
margin-bottom:25px;
overflow:hidden;
}

.progress-fill{
height:100%;
background:linear-gradient(90deg,#4f46e5,#7c3aed);
width:0%;
transition:width .4s ease;
}

.question{
font-size:18px;
margin-bottom:18px;
font-weight:500;
}

input{
width:100%;
padding:14px;
border-radius:8px;
border:1px solid #ddd;
font-size:15px;
margin-bottom:10px;
transition:.2s;
}

input:focus{
outline:none;
border-color:#4f46e5;
box-shadow:0 0 0 2px rgba(79,70,229,.15);
}

.error{
color:#ef4444;
font-size:13px;
margin-bottom:12px;
}

button{
width:100%;
padding:14px;
background:linear-gradient(90deg,#4f46e5,#6366f1);
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
transition:.2s;
}

button:hover{
transform:translateY(-1px);
box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

.complete{
font-size:20px;
color:#16a34a;
margin-top:20px;
font-weight:600;
}

/* Resume Upload */

.resume-box{
border:2px dashed #d1d5db;
padding:30px;
border-radius:10px;
margin-bottom:15px;
cursor:pointer;
transition:.2s;
}

.resume-box:hover{
border-color:#4f46e5;
background:#f9fafb;
}

.resume-text{
color:#666;
font-size:14px;
}

.file-name{
margin-top:10px;
font-size:14px;
color:#16a34a;
font-weight:500;
}

</style>
</head>

<body>

<div class="container">

<h1>AI HR Interview</h1>
<div class="subtitle">Automated Candidate Screening</div>

<div class="progress-text" id="progress">Loading questions...</div>

<div class="progress-bar">
<div class="progress-fill" id="progressFill"></div>
</div>

<div class="question" id="question">Loading...</div>

<input id="answer" placeholder="Type your answer here">

<div class="resume-box" id="resumeBox" style="display:none">
<div class="resume-text">Click or Drag & Drop Resume Here</div>
<input type="file" id="resumeUpload" style="display:none">
<div class="file-name" id="fileName"></div>
</div>

<div class="error" id="error"></div>

<button onclick="nextQuestion()">Next</button>

<div class="complete" id="complete"></div>

</div>

<script>

let questions=[]
let questionIndex=0
let answers=[]
let resumeFile=""

async function loadQuestions(){

const response=await fetch("http://127.0.0.1:8000/questions")
const data=await response.json()

questions=[]

for(const category in data){
questions=questions.concat(data[category])
}

showQuestion()
}

function showQuestion(){

document.getElementById("error").innerText=""

if(questionIndex>=questions.length) return

document.getElementById("question").innerText=questions[questionIndex]

document.getElementById("progress").innerText=
"Question "+(questionIndex+1)+" of "+questions.length

let percent=((questionIndex+1)/questions.length)*100

document.getElementById("progressFill").style.width=percent+"%"

if(questionIndex===questions.length-1){

document.getElementById("answer").style.display="none"
document.getElementById("resumeBox").style.display="block"

}else{

document.getElementById("answer").style.display="block"
document.getElementById("resumeBox").style.display="none"

}
}

function validateInput(answer){

let q=questions[questionIndex].toLowerCase()

if(answer==="") return "This field is required"

if(q.includes("email")){
const email=/^[^\s@]+@[^\s@]+\.[^\s@]+$/
if(!email.test(answer)) return "Enter valid email"
}

if(q.includes("phone")){
const phone=/^[0-9]{10}$/
if(!phone.test(answer)) return "Enter valid 10 digit phone number"
}

return ""
}

function nextQuestion(){

document.getElementById("error").innerText=""

if(questionIndex===questions.length-1){

let file=document.getElementById("resumeUpload").files[0]

if(!file){
document.getElementById("error").innerText="Please upload your resume"
return
}

resumeFile=file.name

finishInterview()
return
}

let input=document.getElementById("answer")
let answer=input.value.trim()

let error=validateInput(answer)

if(error){
document.getElementById("error").innerText=error
return
}

answers.push(answer)

input.value=""

questionIndex++

showQuestion()
}

function finishInterview(){

document.getElementById("question").style.display="none"
document.getElementById("answer").style.display="none"
document.getElementById("resumeBox").style.display="none"
document.querySelector("button").style.display="none"

document.getElementById("progress").style.display="none"
document.querySelector(".progress-bar").style.display="none"

document.getElementById("complete").innerText="Interview Completed 🎉"

saveCandidate()
}

async function saveCandidate(){

let candidateData={

name:answers[0]||"",
dob:answers[1]||"",
phone:answers[2]||"",
email:answers[3]||"",
location:answers[4]||"",

qualification:answers[5]||"",
institution:answers[6]||"",
graduation_year:answers[7]||"",

experience_years:answers[8]||"",
last_company:answers[9]||"",
last_role:answers[10]||"",
responsibilities:answers[11]||"",

last_ctc:answers[12]||"",
last_inhand:answers[13]||"",
expected_salary:answers[14]||"",
notice_period:answers[15]||"",

reason_for_leaving:answers[16]||"",
total_companies:answers[17]||"",

role_applied:answers[18]||"",
typing_speed:answers[19]||"",
typing_accuracy:answers[20]||"",
resume_link:resumeFile
}

await fetch("http://127.0.0.1:8000/submit_interview",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(candidateData)

})

}

/* Resume Upload UI */

const resumeBox=document.getElementById("resumeBox")
const fileInput=document.getElementById("resumeUpload")
const fileName=document.getElementById("fileName")

resumeBox.addEventListener("click",()=>fileInput.click())

fileInput.addEventListener("change",()=>{

const file=fileInput.files[0]

if(file){
fileName.innerText="✔ "+file.name+" uploaded"
}

})

/* Enter key support */

document.getElementById("answer").addEventListener("keypress",function(e){
if(e.key==="Enter") nextQuestion()
})

loadQuestions()

</script>

</body>
</html>
